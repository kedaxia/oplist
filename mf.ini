; 最终规则
ruleset=🐟 漏网之鱼,[]FINAL


; ========== 策略组 ==========

; 主策略
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]♻️ SS节点`[]♻️ CF节点`[]🚑 故障转移`[]DIRECT`.*

; AI
custom_proxy_group=🤖 Ai平台`select`[]🚀 节点选择`[]♻️ 自动选择`[]♻️ SS节点`[]🚑 故障转移

; Telegram
custom_proxy_group=📨 电报消息`select`[]🚀 节点选择`[]♻️ 自动选择

; YouTube
custom_proxy_group=📺 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择

; 自动测速
custom_proxy_group=♻️ 自动选择`url-test`(HK|JP|SG|US|TW)`http://www.gstatic.com/generate_204`300,,50

; SS节点
custom_proxy_group=♻️ SS节点`url-test`(ss|trojan|hy2)`http://www.gstatic.com/generate_204`300,,50

; CloudFlare
custom_proxy_group=♻️ CF节点`url-test`(CF|CloudFlare|Warp)`http://www.gstatic.com/generate_204`300,,50

; 故障转移
custom_proxy_group=🚑 故障转移`fallback`[]♻️ 自动选择`[]♻️ SS节点`[]♻️ CF节点`http://www.gstatic.com/generate_204`180

; 直连
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择

; 拦截
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT

; FINAL
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连`[]♻️ 自动选择`[]🚑 故障转移


; ========== 规则生成 ==========

enable_rule_generator=true
overwrite_original_rules=true