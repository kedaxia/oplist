[custom]
;==========================================================
; SubConverter 自定义规则配置（基于 ACL4SSR）
;==========================================================

; ----------------------------------------------------------
; 局域网 & 白名单（最高优先级，永远直连）
; ----------------------------------------------------------
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list

; ----------------------------------------------------------
; 广告拦截
; ----------------------------------------------------------
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; ----------------------------------------------------------
; 国内直连服务
; ----------------------------------------------------------
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list

; ----------------------------------------------------------
; AI 平台
; ----------------------------------------------------------
ruleset=💬 Ai平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=💬 Ai平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list

; ----------------------------------------------------------
; 社交 & 即时通讯
; ----------------------------------------------------------
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list

; ----------------------------------------------------------
; 流媒体
; ----------------------------------------------------------
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list

; ----------------------------------------------------------
; 代理规则（需在 ChinaDomain 之前匹配）
; ----------------------------------------------------------
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

; Meta / Threads CDN（图片域名未被 GFW 列表收录，须在 GEOIP CN 前手动指定走代理）
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,threads.net
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,cdninstagram.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,fbcdn.net
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,instagram.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,facebook.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,twitter.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,x.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,twimg.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,t.co

; ----------------------------------------------------------
; 中国域名 & IP 直连
; ----------------------------------------------------------
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOIP,CN

; ----------------------------------------------------------
; 兜底
; ----------------------------------------------------------
ruleset=🐟 漏网之鱼,[]FINAL


;==========================================================
; 代理分组
;==========================================================

; 主节点（手动选择）
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]♻️ ss`[]♻️ 星辰`[]♻️ CloudFlare`[]🔯 故障转移`[]DIRECT`.*

; 功能分组（优先走 ss 节点，可手动切换）
custom_proxy_group=💬 Ai平台`select`[]♻️ ss`[]🚀 节点选择`[]♻️ 星辰`[]♻️ CloudFlare`[]🔯 故障转移`(ff7700d1|1b301e07)
custom_proxy_group=📹 油管视频`select`[]♻️ ss`[]🚀 节点选择`[]♻️ 星辰`[]♻️ CloudFlare`[]🔯 故障转移`(ff7700d1|1b301e07)
custom_proxy_group=📲 电报消息`select`[]♻️ ss`[]🚀 节点选择`[]♻️ 星辰`[]♻️ CloudFlare`[]🔯 故障转移`(ff7700d1|1b301e07)

; 基础分组
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT

; 自动测速分组
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=♻️ ss`url-test`(ff7700d1|1b301e07)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=♻️ 星辰`url-test`(🇹🇼 台湾 1|🇹🇼 台湾 2|台湾 test1|🇺🇸 美国)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=♻️ CloudFlare`url-test`(-HTTP-|-HTTPS-)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`[]♻️ 星辰`.*`http://www.gstatic.com/generate_204`180

; 兜底分组
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连`[]♻️ 自动选择`[]🔯 故障转移`.*


enable_rule_generator=true
overwrite_original_rules=true
